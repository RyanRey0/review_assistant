<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gallagher Review Assistant - Estado</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-bright": "#fbf9f8",
                    "surface-dim": "#dbdad9",
                    "secondary-fixed-dim": "#a6cbeb",
                    "secondary": "#3d627e",
                    "tertiary-fixed": "#dee3e7",
                    "tertiary-fixed-dim": "#c2c7cb",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f5f3f3",
                    "primary": "#000000",
                    "on-error-container": "#93000a",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary-fixed-dim": "#c6c6c6",
                    "tertiary": "#000000",
                    "on-secondary-fixed": "#001e30",
                    "surface-container-high": "#e9e8e7",
                    "on-primary-container": "#848484",
                    "primary-fixed": "#e2e2e2",
                    "on-tertiary-container": "#7f8588",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "surface-variant": "#e4e2e2",
                    "secondary-fixed": "#cbe6ff",
                    "on-tertiary-fixed": "#171c1f",
                    "on-surface-variant": "#4c4546",
                    "surface-container-highest": "#e4e2e2",
                    "background": "#fbf9f8",
                    "on-surface": "#1b1c1c",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed-variant": "#474747",
                    "on-tertiary-fixed-variant": "#42484b",
                    "inverse-surface": "#303031",
                    "surface-container": "#efeded",
                    "outline-variant": "#cfc4c5",
                    "surface-tint": "#5e5e5e",
                    "primary-container": "#1b1b1b",
                    "on-primary-fixed": "#1b1b1b",
                    "inverse-on-surface": "#f2f0f0",
                    "surface": "#fbf9f8",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#244a65",
                    "outline": "#7e7576",
                    "on-background": "#1b1c1c",
                    "secondary-container": "#b6dcfd",
                    "tertiary-container": "#171c1f"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "stack-md": "16px",
                    "margin-mobile": "16px",
                    "margin-desktop": "48px",
                    "stack-sm": "8px",
                    "stack-lg": "32px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-sm": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "letterSpacing": "0", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #fbf9f8;
            font-family: 'Inter', sans-serif;
            color: #1b1c1c;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bento-card {
            transition: all 0.2s ease-in-out;
        }
        .bento-card:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border-color: #7e7576;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-surface-lowest dark:bg-surface-container-lowest flex justify-between items-center px-margin-mobile md:px-margin-desktop py-stack-sm w-full border-b border-outline-variant dark:border-outline fixed top-0 z-50">
<div class="flex items-center gap-stack-sm">
<h1 class="font-headline-sm text-headline-sm font-bold text-primary dark:text-on-primary"> Review Assistant</h1>
</div>
<div class="hidden md:flex gap-gutter">
<!-- Active State Logic: 'Estado' is active based on the screen prompt -->
<button class="font-label-lg text-label-lg text-primary dark:text-on-primary border-b-2 border-primary pb-1 hover:text-primary transition-colors duration-200">Estado</button>
<button class="font-label-lg text-label-lg text-on-surface-variant dark:text-surface-variant pb-1 hover:text-primary transition-colors duration-200">Reglas</button>
<button class="font-label-lg text-label-lg text-on-surface-variant dark:text-surface-variant pb-1 hover:text-primary transition-colors duration-200">Ajustes</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-12 px-margin-mobile md:px-margin-desktop max-w-7xl mx-auto w-full">
<div class="mb-stack-lg">
</div>
<!-- Bento Layout for Status -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<!-- Left Side: Status Summary Statistics (High-End Addition) -->
<div class="md:col-span-4 space-y-gutter">
</div>
</div>
<!-- Right Side: Status List -->
<div class="md:col-span-8 space-y-stack-md">
<!-- Card 1: Destinatarios en Cc -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md flex items-center gap-stack-md bento-card">
<div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-error-container font-bold" data-icon="close">close</span>
</div>
<div class="flex-grow">
<h4 class="font-headline-sm text-headline-sm text-primary">Destinatarios en Cc</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">Faltan: <span class="font-semibold">registro1@human.com</span></p>
</div>
<button class="bg-primary text-on-primary px-stack-md py-stack-sm rounded-lg font-label-md text-label-md hover:opacity-80 transition-opacity">Corregir</button>
</div>
<!-- Card 2: Asunto del Correo -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md flex items-center gap-stack-md bento-card">
<div class="w-12 h-12 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-error-container font-bold" data-icon="close">close</span>
</div>
<div class="flex-grow">
<h4 class="font-headline-sm text-headline-sm text-primary">Asunto del Correo</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">No cumple los patrones definidos</p>
</div>
<button class="bg-secondary text-on-secondary px-stack-md py-stack-sm rounded-lg font-label-md text-label-md hover:opacity-80 transition-opacity">Ver Reglas</button>
</div>
<!-- Card 3: Archivos Adjuntos -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-md flex items-center gap-stack-md bento-card">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container font-bold" data-icon="check">check</span>
</div>
<div class="flex-grow">
<h4 class="font-headline-sm text-headline-sm text-primary">Archivos Adjuntos</h4>
<p class="font-body-sm text-body-sm text-on-surface-variant">Tiene archivos adjuntos</p>
</div>
<span class="font-label-md text-label-md text-secondary bg-secondary-fixed-dim px-stack-sm py-unit rounded">Válido</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-16 bg-surface-bright dark:bg-surface-container border-t border-outline-variant dark:border-outline z-50">
<!-- Estado Active -->
<a class="flex flex-col items-center justify-center text-primary dark:text-on-primary font-bold border-t-2 border-primary -mt-[2px] w-full h-full" href="#">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-lg text-label-lg">Estado</span>
</a>
<!-- Reglas Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant opacity-70 w-full h-full hover:bg-secondary-fixed-dim transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="rule">rule</span>
<span class="font-label-lg text-label-lg">Reglas</span>
</a>
<!-- Ajustes Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant opacity-70 w-full h-full hover:bg-secondary-fixed-dim transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-lg text-label-lg">Ajustes</span>
</a>
</nav>
<script>
        // Micro-interaction for hover effects on cards
        document.querySelectorAll('.bento-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                card.style.transform = 'translateY(-2px)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
