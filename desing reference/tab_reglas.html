<!DOCTYPE html>
<html class="light" lang="es" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Gallagher Review Assistant - Reglas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#fbf9f8",
                        "surface-dim": "#dbdad9",
                        "secondary-fixed-dim": "#a6cbeb",
                        "secondary": "#3d627e",
                        "tertiary-fixed": "#dee3e7",
                        "tertiary-fixed-dim": "#c2c7cb",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f5f3f3",
                        "primary": "#000000",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#c6c6c6",
                        "tertiary": "#000000",
                        "on-secondary-fixed": "#001e30",
                        "surface-container-high": "#e9e8e7",
                        "on-primary-container": "#848484",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary-container": "#7f8588",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#3c617d",
                        "inverse-primary": "#c6c6c6",
                        "surface-variant": "#e4e2e2",
                        "secondary-fixed": "#cbe6ff",
                        "on-tertiary-fixed": "#171c1f",
                        "on-surface-variant": "#4c4546",
                        "surface-container-highest": "#e4e2e2",
                        "background": "#fbf9f8",
                        "on-surface": "#1b1c1c",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#474747",
                        "on-tertiary-fixed-variant": "#42484b",
                        "inverse-surface": "#303031",
                        "surface-container": "#efeded",
                        "outline-variant": "#cfc4c5",
                        "on-error": "#ffffff",
                        "surface-tint": "#5e5e5e",
                        "primary-container": "#1b1b1b",
                        "on-primary-fixed": "#1b1b1b",
                        "inverse-on-surface": "#f2f0f0",
                        "surface": "#fbf9f8",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#244a65",
                        "outline": "#7e7576",
                        "on-background": "#1b1c1c",
                        "secondary-container": "#b6dcfd",
                        "tertiary-container": "#171c1f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "unit": "4px",
                        "stack-md": "16px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "letterSpacing": "0", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf9f8;
            color: #1b1c1c;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .zebra-table tr:nth-child(even) {
            background-color: #f2f7fb;
        }

        .tab-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="min-h-screen bg-background">
    <!-- TopAppBar -->
    <header
        class="bg-surface-lowest dark:bg-surface-container-lowest border-b border-outline-variant dark:border-outline fixed top-0 left-0 w-full z-50">
        <div class="flex justify-between items-center px-margin-desktop py-stack-sm w-full h-16 max-w-[1280px] mx-auto">
            <div class="flex items-center gap-stack-sm">

                <h1 class="font-headline-sm text-headline-sm font-bold text-primary dark:text-on-primary">Review
                    Assistant</h1>
            </div>
            <!-- Desktop Navigation Shell (TopAppBar Integrated) -->
            <nav class="hidden md:flex items-center h-full gap-gutter">
                <a class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-on-primary transition-colors duration-200 h-full flex items-center px-4 font-label-lg text-label-lg"
                    href="#">Estado</a>
                <a class="text-primary dark:text-on-primary border-b-2 border-primary h-full flex items-center px-4 font-label-lg text-label-lg font-bold"
                    href="#">Reglas</a>
                <a class="text-on-surface-variant dark:text-surface-variant hover:text-primary dark:hover:text-on-primary transition-colors duration-200 h-full flex items-center px-4 font-label-lg text-label-lg"
                    href="#">Ajustes</a>
            </nav>
            <div class="flex items-center gap-stack-md">

                <button class="p-2 rounded-full hover:bg-surface-container-high transition-colors">

                </button>
            </div>
        </div>
    </header>
    <main class="pt-24 pb-20 px-margin-mobile md:px-margin-desktop max-w-[1280px] mx-auto">
        <!-- Header Section -->
        <section class="mb-stack-lg">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-stack-md">
                <div>



                </div>

            </div>
        </section>
        <!-- Rules Content (Asymmetric Layout / Bento inspired) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
            <!-- Main Rules Table Container -->
            <div class="lg:col-span-8 bg-white border border-outline-variant rounded-xl overflow-hidden shadow-sm">
                <div
                    class="p-stack-md border-b border-outline-variant bg-surface-container-low flex justify-between items-center">
                    <h3 class="font-headline-sm text-headline-sm text-on-surface">Reglas Activas</h3>
                    <div class="flex gap-2">
                        <span
                            class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label-md text-label-md">3
                            Total</span>
                    </div>
                </div>
                <div class="divide-y divide-outline-variant">
                    <!-- Row 1 -->
                    <div
                        class="px-stack-md py-6 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-surface-container-low transition-colors duration-150">
                        <div class="flex-1">
                            <h4 class="font-headline-sm text-headline-sm text-on-surface">Correos en Copia</h4>
                            <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">registro1@human.com, ...
                            </p>
                        </div>
                        <div class="flex items-center">
                            <span
                                class="inline-flex items-center px-3 py-1 bg-[#E8F5E9] text-[#2E7D32] rounded-full font-label-md text-label-md font-bold uppercase">Activo</span>
                        </div>
                    </div>
                    <!-- Row 2 -->
                    <div
                        class="px-stack-md py-6 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-surface-container-low transition-colors duration-150">
                        <div class="flex-1">
                            <h4 class="font-headline-sm text-headline-sm text-on-surface">Palabras Clave del Asunto</h4>
                            <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">"REGISTRO", "DOS"</p>
                        </div>
                        <div class="flex items-center">
                            <span
                                class="inline-flex items-center px-3 py-1 bg-[#E8F5E9] text-[#2E7D32] rounded-full font-label-md text-label-md font-bold uppercase">Activo</span>
                        </div>
                    </div>
                    <!-- Row 3 -->
                    <div
                        class="px-stack-md py-6 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:bg-surface-container-low transition-colors duration-150">
                        <div class="flex-1">
                            <h4 class="font-headline-sm text-headline-sm text-on-surface">Archivos Adjuntos</h4>
                            <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Requerido</p>
                        </div>
                        <div class="flex items-center">
                            <span
                                class="inline-flex items-center px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full font-label-md text-label-md font-bold uppercase">Inactivo</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Side Info Panel -->
            <div class="lg:col-span-4 space-y-gutter">
                <!-- Summary Card -->

                <!-- Visual Asset / Context -->

            </div>
        </div>
    </main>
    <!-- BottomNavBar (Mobile Only) -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-16 bg-surface-bright dark:bg-surface-container border-t border-outline-variant dark:border-outline z-50">
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant opacity-70 hover:bg-secondary-fixed-dim dark:hover:bg-secondary-container transition-all flex-1 h-full"
            href="#">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="font-label-lg text-label-lg">Estado</span>
        </a>
        <a class="flex flex-col items-center justify-center text-primary dark:text-on-primary font-bold border-t-2 border-primary -mt-[2px] hover:bg-secondary-fixed-dim dark:hover:bg-secondary-container transition-all flex-1 h-full"
            href="#">
            <span class="material-symbols-outlined">rule</span>
            <span class="font-label-lg text-label-lg">Reglas</span>
        </a>
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant opacity-70 hover:bg-secondary-fixed-dim dark:hover:bg-secondary-container transition-all flex-1 h-full"
            href="#">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label-lg text-label-lg">Ajustes</span>
        </a>
    </nav>
    <script>
        // Simple interaction for rule table rows
        document.querySelectorAll('tbody tr').forEach(row => {
            row.addEventListener('click', () => {
                row.classList.add('scale-95', 'duration-150');
                setTimeout(() => {
                    row.classList.remove('scale-95');
                }, 150);
            });
        });
    </script>




</body>

</html>
